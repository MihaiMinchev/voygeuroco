<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyageur & Co — The Berlin Blog</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── NAV ── -->
<nav id="main-nav">
  <div class="nav-brand" onclick="window.location.href='index.html'">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
    </div>
    <span class="nav-brand-text">Voyageur<span>Co</span></span>
  </div>
  <!-- ✅ Поправени nav линкове — добавени <li> тагове -->
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="map.html">Map</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li>
      <a href="create.html"
         style="color: var(--gold); border: 1px solid rgba(201,168,76,0.35); padding: 5px 14px; border-radius: 100px;">
        Create my trip
      </a>
    </li>
  </ul>
</nav>

<!-- ── BLOG LIST ── -->
<!-- ✅ Добавено class="page active" за да се показва при зареждане -->
<div id="page-blog" class="page active">
  <div class="page-hero">
    <div class="page-hero-label">Travel Stories</div>
    <h1 class="page-hero-title">The Berlin <em>Blog</em></h1>
    <p class="page-hero-sub">Insider tips, seasonal guides, and stories from history of one of most important cities.</p>
  </div>
  <div class="blog-content">
    <div class="blog-grid" id="blog-grid"></div>
  </div>
</div>

<!-- ── BLOG POST ── -->
<div id="page-blog-post" class="page">
  <div class="post-hero" id="post-hero-img">
    <div class="post-hero-overlay"></div>
    <div class="post-hero-content">
      <button class="post-back-btn" onclick="window.location.href='blog.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Blog
      </button>
      <div class="post-tag-label" id="post-tag"></div>
      <h1 class="post-title" id="post-title"></h1>
      <div class="post-date" id="post-date"></div>
    </div>
  </div>
  <div class="post-body-wrap">
    <div class="post-body" id="post-body"></div>
    <div class="post-footer">
      <button class="post-back-btn-bottom" onclick="window.location.href='blog.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to all articles
      </button>
    </div>
  </div>
</div>

<!-- ── SCRIPTS ── -->
<script defer src="blog.js"></script>
<script defer src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadBlog();
  });
</script>

</body>
</html>
